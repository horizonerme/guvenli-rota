<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GüvenliRota AI - Ana Ekran</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        /* ... (diğer tüm stillerin aynı kalacak) ... */
        #acil-alarm-ekrani { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(255,0,0,0.85); z-index: 99999; color: white; text-align: center; justify-content: center; align-content: center; flex-direction: column; animation: flasorEfekti 0.6s infinite alternate; }
        @keyframes flasorEfekti { from { background-color: rgba(255,0,0,0.9); } to { background-color: rgba(100,0,0,0.9); } }
        .alarm-btn { background: white; color: red; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="acil-alarm-ekrani">
        <h1 style="font-size: 35px; margin: 0;">🚨 ACİL DURUM ALARMI 🚨</h1>
        <p id="alarm-mesaj-metni" style="font-size: 20px; margin: 20px 0; font-weight: bold;"></p>
        <button class="alarm-btn" id="takip-baslat-btn">📍 Canlı Takip Et</button>
        <button class="alarm-btn" style="background:#ccc; color:#333; margin-left:10px;" onclick="alarmKapat()">Yoksay</button>
    </div>

    <script>
        // Firebase ve diğer tüm scriptlerin aynı kalacak...
        // ... (kodun geri kalanı aynı) ...

        // --- EN SONA BU FONKSİYONU EKLE ---
        function acilDurumuGoster() {
            const alarmEkrani = document.getElementById('acil-alarm-ekrani');
            if (alarmEkrani) {
                alarmEkrani.style.display = 'flex';
                // Siren sesini başlat
                if (typeof sirenBaslat === 'function') {
                    sirenBaslat();
                }
            }
        }

        function alarmKapat() { 
            document.getElementById('acil-alarm-ekrani').style.display="none"; 
            if (typeof sirenDurdur === 'function') sirenDurdur();
            if (typeof acilDurumSireni !== 'undefined') {
                acilDurumSireni.pause(); 
                acilDurumSireni.currentTime=0; 
            }
        }
    </script>
</body>
</html>
